# Production — start with: SPRING_PROFILES_ACTIVE=prod
# Load env from a file the systemd way, e.g. EnvironmentFile=/home/ubuntu/apps/myapp/configs/.env
#
# --- Security (do not paste secrets into this file; use server env / IAM only) ---
# You posted DB and IAM keys in chat — rotate RDS password and delete/disable those IAM keys,
# then use a new IAM user or (better) an EC2 instance role with s3:PutObject/GetObject/DeleteObject on your bucket.
#
# --- RDS MySQL ---
# MYSQL_HOST          e.g. jobico.xxxxxxxx.ap-south-2.rds.amazonaws.com  (no https)
# MYSQL_PORT          3306
# MYSQL_DATABASE      your schema name (e.g. jobico)
# MYSQL_USERNAME      e.g. admin
# MYSQL_PASSWORD      from RDS (store only in ~/apps/myapp/configs/.env or Secrets Manager)
#
# --- JWT / App ---
# JWT_SECRET              openssl rand -base64 48
# APP_BASE_URL            https://api.yourdomain.com   (or http://EC2_PUBLIC_IP:8080 during testing)
# ADMIN_SECRET_KEY
# CORS_ALLOWED_ORIGIN_PATTERNS   https://your-frontend-domain.com,http://localhost:5173
#
# --- S3 (resumes + generated PDFs when aws.s3.enabled=true) ---
# Create bucket in ap-south-2; block public access; use IAM policy scoped to that bucket.
# SDK reads credentials in this order: env vars, ~/.aws/credentials, EC2 instance profile.
# Env names must be exactly (AWS default):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
# Optional: AWS_SESSION_TOKEN (when using temporary creds)
#   S3_BUCKET              bucket name only (no s3://)
#   AWS_REGION             ap-south-2
#
# --- Optional .env example (place on server, not in git) ---
# SPRING_PROFILES_ACTIVE=prod
# MYSQL_HOST=jobico.xxxxxxxx.ap-south-2.rds.amazonaws.com
# MYSQL_PORT=3306
# MYSQL_DATABASE=jobico
# MYSQL_USERNAME=admin
# MYSQL_PASSWORD=...
# JWT_SECRET=...
# APP_BASE_URL=https://api.example.com
# ADMIN_SECRET_KEY=...
# CORS_ALLOWED_ORIGIN_PATTERNS=https://app.example.com
# AWS_REGION=ap-south-2
# S3_BUCKET=your-bucket-name
# AWS_ACCESS_KEY_ID=...        # omit if using instance role
# AWS_SECRET_ACCESS_KEY=...
# MAIL_USERNAME=...
# MAIL_PASSWORD=...
#
# SMSLOGIN (OTP over HTTP — values only in server .env)
# OTP_SMS_ENABLED=true
# OTP_SMS_PROVIDER=smslogin
# SMSLOGIN_USERNAME=
# SMSLOGIN_PASSWORD=
# SMSLOGIN_API_KEY=
# SMSLOGIN_BASE_URL=https://smslogin.co
# SMSLOGIN_SEND_PATH=/v3/api.php
# SMSLOGIN_MOBILE_PREFIX=91
# SMSLOGIN_TEMPLATE_ID=...   (DLT template id from panel)
# SMSLOGIN_SENDER_ID=...     (6-char approved sender)
# SMSLOGIN_REQUEST_STYLE=GET_QUERY

spring.application.name=jobico

server.port=${SERVER_PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

# RDS — TLS required (aligns with typical RDS MySQL)
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=true&requireSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:15}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:3}
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Local disk fallback when S3 is off (usually unused if aws.s3.enabled=true)
file.upload-dir=${FILE_UPLOAD_DIR:/var/jobico/uploads/resumes}
app.document.storage-dir=${DOCUMENT_STORAGE_DIR:/var/jobico/uploads/documents}

# Amazon S3 — set aws.s3.enabled=true after bucket + IAM are ready
aws.s3.enabled=${AWS_S3_ENABLED:false}
aws.s3.bucket=${S3_BUCKET}
aws.s3.region=${AWS_REGION:ap-south-2}
aws.s3.resume-prefix=${AWS_S3_RESUME_PREFIX:resumes}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

otp.expiry-ms=${OTP_EXPIRY_MS:300000}
otp.resend-cooldown-ms=${OTP_RESEND_COOLDOWN_MS:30000}
fast2sms.api.key=${FAST2SMS_API_KEY:}
otp.sms.enabled=${OTP_SMS_ENABLED:false}
# SMS provider: none | fast2sms | smslogin (secrets only in .env / systemd EnvironmentFile)
otp.sms.provider=${OTP_SMS_PROVIDER:none}

# SMSLOGIN — set SMSLOGIN_* in ~/apps/myapp/configs/.env (never commit real values)
smslogin.username=${SMSLOGIN_USERNAME:}
smslogin.password=${SMSLOGIN_PASSWORD:}
smslogin.api-key=${SMSLOGIN_API_KEY:}
smslogin.base-url=${SMSLOGIN_BASE_URL:https://smslogin.co}
smslogin.send-path=${SMSLOGIN_SEND_PATH:/v3/api.php}
smslogin.full-url=${SMSLOGIN_FULL_URL:}
smslogin.mobile-prefix=${SMSLOGIN_MOBILE_PREFIX:91}
smslogin.message-template=${SMSLOGIN_MESSAGE_TEMPLATE:Your OTP is {otp}}
# smslogin FAQ: GET https://smslogin.co/v3/api.php?username&apikey&senderid&mobile&message&templateid
smslogin.request-style=${SMSLOGIN_REQUEST_STYLE:GET_QUERY}
smslogin.sender-id=${SMSLOGIN_SENDER_ID:}
smslogin.template-id=${SMSLOGIN_TEMPLATE_ID:}
smslogin.include-password-query=${SMSLOGIN_INCLUDE_PASSWORD_QUERY:false}
smslogin.field.username=${SMSLOGIN_FIELD_USERNAME:username}
smslogin.field.password=${SMSLOGIN_FIELD_PASSWORD:password}
smslogin.field.api-key=${SMSLOGIN_FIELD_API_KEY:apikey}
smslogin.field.mobile=${SMSLOGIN_FIELD_MOBILE:mobile}
smslogin.field.message=${SMSLOGIN_FIELD_MESSAGE:message}
smslogin.field.sender=${SMSLOGIN_FIELD_SENDER:senderid}
smslogin.field.template=${SMSLOGIN_FIELD_TEMPLATE:templateid}

app.base-url=${APP_BASE_URL}
app.company.name=${APP_COMPANY_NAME:Jobico}
app.admin-secret-key=${ADMIN_SECRET_KEY}

app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.task.execution.pool.core-size=${TASK_POOL_CORE:4}
spring.task.execution.pool.max-size=${TASK_POOL_MAX:16}
spring.task.execution.pool.queue-capacity=${TASK_POOL_QUEUE:200}

logging.level.root=INFO
logging.level.com.example.jobico=INFO