spring.application.name=jobico
server.port=8082
server.address=0.0.0.0

spring.datasource.url=jdbc:mysql://localhost:3306/jobico
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.SQL=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/resumes

# AWS S3 (prod: set true + bucket; credentials via AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY or instance role)
aws.s3.enabled=false
aws.s3.bucket=
aws.s3.region=ap-south-2
aws.s3.resume-prefix=resumes

# JWT
jwt.secret=mySuperSecretKeyThatIsAtLeast64CharactersLongForHS512Encryption123456
jwt.expiration-ms=86400000

# OTP / SMS (credentials only via env on server — see application-prod.properties)
otp.expiry-ms=300000
otp.resend-cooldown-ms=30000
fast2sms.api.key=YOUR_FAST2SMS_API_KEY_HERE
otp.sms.enabled=false
otp.sms.provider=none

smslogin.username=
smslogin.password=
smslogin.api-key=
smslogin.base-url=https://smslogin.co
smslogin.send-path=/v3/api.php
smslogin.full-url=
smslogin.mobile-prefix=91
smslogin.message-template=Your OTP is {otp}
smslogin.request-style=GET_QUERY
smslogin.sender-id=
smslogin.template-id=
smslogin.include-password-query=false
smslogin.field.sender=senderid
smslogin.field.template=templateid

# App
app.base-url=http://localhost:8081
app.company.name=Jobico
app.admin-secret-key=JOBICO_ADMIN_2024

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=ankit1718190@gmail.com
spring.mail.password=aszjslqxwmxdvfsa
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Thread pool
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100